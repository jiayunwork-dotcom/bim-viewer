version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bim-postgres
    environment:
      POSTGRES_DB: bimviewer
      POSTGRES_USER: bimuser
      POSTGRES_PASSWORD: bimpanass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bimuser -d bimviewer"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bim-network

  bim-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bim-api
    environment:
      DATABASE_URL: postgres://bimuser:bimpanass@postgres:5432/bimviewer?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bim-network

  bim-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bim-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bim-api
    networks:
      - bim-network

volumes:
  pgdata:

networks:
  bim-network:
    driver: bridge
